services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-protrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-protrader_dev}
      POSTGRES_DB: ${POSTGRES_DB:-protrader}
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-protrader}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-protrader_dev}
      POSTGRES_DB: ${TIMESCALE_DB:-marketdata}
    ports:
      - "5433:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ./backend/infra/docker/init-timescale.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: protrader
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # Admin dashboard API (port 8001)
  # Loads secrets from backend/.env (Compose does NOT auto-load that path for ${VAR} substitution).
  admin-api:
    build:
      context: .
      dockerfile: backend/services/admin/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - path: ./.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Override: shared backend/.env uses REDIS_URL for gateway (db 0); admin service must use db 1
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./backend/services/admin:/app
      - ./backend/packages/common:/app/packages/common
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  gateway:
    build:
      context: .
      dockerfile: backend/services/gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Kafka "healthy" can block for a long time; gateway only needs broker up
      kafka:
        condition: service_started
    volumes:
      - ./backend/services/gateway:/app/services/gateway
      - ./backend/packages:/app/packages

  market-data:
    build:
      context: .
      dockerfile: backend/services/market-data/Dockerfile
    env_file:
      - path: ./.env
        required: false
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./backend/services/market-data:/app/services/market_data
      - ./backend/packages:/app/packages

  b-book-engine:
    build:
      context: .
      dockerfile: backend/services/b-book-engine/Dockerfile
    env_file:
      - path: ./.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./backend/services/b-book-engine:/app/services/b_book_engine
      - ./backend/packages:/app/packages

  risk-engine:
    build:
      context: .
      dockerfile: backend/services/risk-engine/Dockerfile
    env_file:
      - path: ./.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./backend/services/risk-engine:/app/services/risk_engine
      - ./backend/packages:/app/packages

  # Trader frontend (port 3000) — PRODUCTION IMAGE: UI edits need a rebuild to show in the browser:
  #   docker compose build trader-frontend && docker compose up -d trader-frontend
  # For live reload while coding, run the app on the host instead: cd frontend/trader && npm run dev
  trader-frontend:
    build:
      context: ./frontend/trader
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Do NOT set NEXT_PUBLIC_* http/ws here — browsers on https:// will hit mixed-content blocks.
      # App route src/app/api/v1/[...path]/route.ts proxies using INTERNAL_API_URL or TRADER_API_PROXY_TARGET.
      INTERNAL_API_URL: http://gateway:8000/api/v1
      TRADER_API_PROXY_TARGET: http://gateway:8000
    depends_on:
      - gateway

  # Admin frontend (port 3001)
  admin-frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      # Server-side proxy /admin-api → admin-api (browser must not use docker hostname admin-api)
      ADMIN_API_PROXY_TARGET: http://admin-api:8001
    depends_on:
      - gateway
      - admin-api

  # One-off migration runner — NOT started automatically.
  # Run with: docker compose --profile migrate up migrate
  migrate:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -e packages/common --quiet &&
             alembic -c infra/migrations/alembic.ini upgrade head"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader}
    volumes:
      - ./backend:/app
    profiles:
      - migrate

volumes:
  pg_data:
  ts_data:
  redis_data:
