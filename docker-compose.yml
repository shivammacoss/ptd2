services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: protrader
      POSTGRES_PASSWORD: protrader_dev
      POSTGRES_DB: protrader
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: protrader
      POSTGRES_PASSWORD: protrader_dev
      POSTGRES_DB: marketdata
    ports:
      - "5433:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ./infra/docker/init-timescale.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: protrader
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # Admin dashboard API (port 8001)
  admin-api:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/1
      USER_JWT_SECRET: dev-secret-change-in-production
      ADMIN_JWT_SECRET: admin-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
    volumes:
      - ./services/admin:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Kafka "healthy" can block for a long time; gateway only needs broker up
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TIMESCALE_URL: postgresql+asyncpg://protrader:protrader_dev@timescaledb:5432/marketdata
      JWT_SECRET: dev-secret-change-in-production
      ENVIRONMENT: development
    volumes:
      - ./services/gateway:/app/services/gateway
      - ./packages:/app/packages

  market-data:
    build:
      context: .
      dockerfile: services/market-data/Dockerfile
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      TIMESCALE_URL: postgresql+asyncpg://protrader:protrader_dev@timescaledb:5432/marketdata
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENVIRONMENT: development
    volumes:
      - ./services/market-data:/app/services/market-data
      - ./packages:/app/packages

  b-book-engine:
    build:
      context: .
      dockerfile: services/b-book-engine/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENVIRONMENT: development
    volumes:
      - ./services/b-book-engine:/app/services/b-book-engine
      - ./packages:/app/packages

  risk-engine:
    build:
      context: .
      dockerfile: services/risk-engine/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENVIRONMENT: development
    volumes:
      - ./services/risk-engine:/app/services/risk-engine
      - ./packages:/app/packages

volumes:
  pg_data:
  ts_data:
  redis_data:
