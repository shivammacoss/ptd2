services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: protrader
      POSTGRES_PASSWORD: protrader_dev
      POSTGRES_DB: protrader
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: protrader
      POSTGRES_PASSWORD: protrader_dev
      POSTGRES_DB: marketdata
    ports:
      - "5433:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ./backend/infra/docker/init-timescale.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: protrader
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # Admin dashboard API (port 8001)
  admin-api:
    build:
      context: .
      dockerfile: backend/services/admin/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/1
      USER_JWT_SECRET: dev-secret-change-in-production
      ADMIN_JWT_SECRET: admin-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
    volumes:
      - ./backend/services/admin:/app
      - ./backend/packages/common:/app/packages/common
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  gateway:
    build:
      context: .
      dockerfile: backend/services/gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Kafka "healthy" can block for a long time; gateway only needs broker up
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TIMESCALE_URL: postgresql+asyncpg://protrader:protrader_dev@timescaledb:5432/marketdata
      JWT_SECRET: dev-secret-change-in-production
      INFOWAY_API_KEY: ${INFOWAY_API_KEY}
      INFOWAY_API_URL: ${INFOWAY_API_URL:-https://api.infoway.io}
      ENVIRONMENT: development
    volumes:
      - ./backend/services/gateway:/app/services/gateway
      - ./backend/packages:/app/packages

  market-data:
    build:
      context: .
      dockerfile: backend/services/market-data/Dockerfile
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      TIMESCALE_URL: postgresql+asyncpg://protrader:protrader_dev@timescaledb:5432/marketdata
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INFOWAY_API_KEY: ${INFOWAY_API_KEY}
      INFOWAY_API_URL: ${INFOWAY_API_URL:-https://api.infoway.io}
      ENVIRONMENT: development
    volumes:
      - ./backend/services/market-data:/app/services/market_data
      - ./backend/packages:/app/packages

  b-book-engine:
    build:
      context: .
      dockerfile: backend/services/b-book-engine/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENVIRONMENT: development
    volumes:
      - ./backend/services/b-book-engine:/app/services/b_book_engine
      - ./backend/packages:/app/packages

  risk-engine:
    build:
      context: .
      dockerfile: backend/services/risk-engine/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENVIRONMENT: development
    volumes:
      - ./backend/services/risk-engine:/app/services/risk_engine
      - ./backend/packages:/app/packages

  # Trader frontend (port 3000)
  trader-frontend:
    build:
      context: ./frontend/trader
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://gateway:8000
      NEXT_PUBLIC_WS_URL: ws://gateway:8000
      INTERNAL_API_URL: http://gateway:8000/api/v1
    depends_on:
      - gateway

  # Admin frontend (port 3001)
  admin-frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://gateway:8000
      NEXT_PUBLIC_ADMIN_API_URL: http://admin-api:8001
      NEXT_PUBLIC_WS_URL: ws://gateway:8000
    depends_on:
      - gateway
      - admin-api

  # One-off migration runner — NOT started automatically.
  # Run with: docker compose --profile migrate up migrate
  migrate:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -e packages/common --quiet &&
             alembic -c infra/migrations/alembic.ini upgrade head"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://protrader:protrader_dev@postgres:5432/protrader
    volumes:
      - ./backend:/app
    profiles:
      - migrate

volumes:
  pg_data:
  ts_data:
  redis_data:
